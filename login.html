<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSK Traders – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --navy:   #0b2545;
      --blue:   #1362a8;
      --accent: #f5a623;
      --white:  #ffffff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(19,98,168,0.35) 0%, transparent 70%);
      top: -100px; left: -100px;
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      border-radius: 50%;
    }

    .login-wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px; padding: 16px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 48px 40px;
    }

    .brand { text-align: center; margin-bottom: 36px; }

    .brand-icon {
      width: 64px; height: 64px;
      background: var(--accent); border-radius: 16px;
      display: inline-flex; align-items: center;
      justify-content: center; font-size: 28px;
      color: var(--navy); margin-bottom: 16px;
    }

    .brand h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; color: var(--white);
      letter-spacing: 4px; line-height: 1;
    }

    .brand p {
      color: rgba(255,255,255,0.5); font-size: 0.82rem;
      margin-top: 6px; letter-spacing: 1px; text-transform: uppercase;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block; color: rgba(255,255,255,0.6);
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-wrap i {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35); font-size: 15px;
    }

    .form-group input {
      width: 100%; padding: 13px 14px 13px 40px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: var(--white);
      font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s; outline: none;
    }

    .form-group input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.12);
    }

    .form-group input::placeholder { color: rgba(255,255,255,0.25); }

    .login-btn {
      width: 100%; padding: 14px;
      background: var(--accent); color: var(--navy);
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      font-weight: 700; letter-spacing: 1px; border: none;
      border-radius: 10px; cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .login-btn:hover   { opacity: 0.88; transform: translateY(-1px); }
    .login-btn:disabled{ opacity: 0.6; cursor: not-allowed; transform: none; }

    .msg-box {
      display: none; padding: 10px 14px;
      border-radius: 8px; font-size: 0.85rem;
      margin-bottom: 16px; text-align: center;
    }
    .msg-error {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.4);
      color: #ff8a80;
    }
    .msg-success {
      background: rgba(39,174,96,0.15);
      border: 1px solid rgba(39,174,96,0.4);
      color: #2ecc71;
    }
    .msg-box.show { display: block; }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon"><i class="fa-solid fa-pills"></i></div>
      <h1>MSK Traders</h1>
      <p>Pharmacy Management System</p>
    </div>

    <div id="msgBox" class="msg-box msg-error"></div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
      <i class="fa-solid fa-right-to-bracket"></i> Sign In
    </button>
  </div>
</div>

<script>
  const API = "http://localhost:3000/api";

  function showMsg(message, type = "error") {
    const box = document.getElementById("msgBox");
    box.className = "msg-box msg-" + type + " show";
    box.innerHTML = `<i class="fa-solid ${type === "error" ? "fa-circle-exclamation" : "fa-check-circle"}"></i> ${message}`;
    if (type === "error") {
      setTimeout(() => box.classList.remove("show"), 4000);
    }
  }

  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("loginBtn");

    if (!username || !password) {
      showMsg("Please enter username and password.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

    try {
      const res  = await fetch(API + "/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.success) {
        // Store logged in state and username
        localStorage.setItem("loggedIn",  "true");
        localStorage.setItem("adminUser", data.username);
        window.location.href = "index.html";
      } else {
        showMsg(data.error || "Invalid username or password.");
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
      }
    } catch (err) {
      showMsg("Cannot connect to server. Make sure node server.js is running.");
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
    }
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
</script>
</body>
</html>
